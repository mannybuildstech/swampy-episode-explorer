<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episode Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Episode Explorer</h1>
      <a class="game-nav-button" href="https://swampystories.com" target="_blank" rel="noopener noreferrer">Listen</a>
    </header>

    <main>
      <p id="status">Loading episodes…</p>
      <section class="soundboard" aria-label="Scene and character soundboard">
        <div class="category-row" id="categoryRow" role="tablist" aria-label="Scenes"></div>
        <div class="character-stage" id="characterStage" aria-live="polite">
          <p class="stage-label">Tap a character to hear their sound</p>
          <div class="character-row" id="characterRow"></div>
        </div>
      </section>
      <div id="map"></div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
