<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episode Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Looking for a Florida adventure? Get inspired by real family stories before you visit.</h1>
      <a class="game-nav-button" href="https://swampystories.com" target="_blank" rel="noopener noreferrer">Listen</a>
    </header>

    <main>
      <div id="map"></div>
    </main>

    <div id="episode-image-modal" class="image-modal" aria-hidden="true">
      <button id="image-modal-close" class="image-modal-close" aria-label="Close image viewer">×</button>
      <img id="image-modal-photo" class="image-modal-photo" alt="Episode artwork" />
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
