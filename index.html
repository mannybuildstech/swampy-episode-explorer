<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swampy Stories Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Swampy Stories — Florida Episode Map</h1>
      <p>Explore each episode's real-world Florida location with artwork pins.</p>
      <button id="toggleListBtn" type="button" aria-expanded="false">Show Episode List</button>
      <p id="status">Loading episodes…</p>
    </header>

    <main>
      <div id="map"></div>
      <aside id="episodePane" class="hidden" aria-hidden="true">
        <h2>Episodes</h2>
        <ul id="episodeList"></ul>
      </aside>
    </main>

    <template id="episodeTemplate">
      <li class="episode-card">
        <img class="episode-image" alt="Episode artwork" />
        <div>
          <h3 class="episode-title"></h3>
          <p class="episode-location"></p>
          <p class="episode-description"></p>
        </div>
      </li>
    </template>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
